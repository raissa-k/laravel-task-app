services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_task_app
    ports:
      - "8082:80"
    command: >
      sh -c "if [ ! -f vendor/autoload.php ]; then
        composer install --no-interaction --prefer-dist;
      else
        composer dump-autoload --no-interaction --optimize;
      fi
      && if [ ! -f .env ]; then cp .env.example .env; fi
      && php artisan key:generate --force
      && php artisan migrate --force
      && chown -R www-data:www-data storage bootstrap/cache
      && apache2-foreground"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: tasks
      DB_USERNAME: app
      DB_PASSWORD: app123
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: laravel_task_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tasks
      MYSQL_USER: app
      MYSQL_PASSWORD: app123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3309:3306"
    volumes:
      - laravel_task_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  laravel_task_mysql_data:
